# OpenClaw Backup Configuration
# Users can override via RESTIC_BACKUP_CONFIG_FILE env var

# Restic repository location (S3-compatible)
# Environment variables are expanded at runtime
repository: "s3:${RESTIC_SPACES_ENDPOINT}/${RESTIC_SPACES_BUCKET}/${RESTIC_HOST}/restic"

# Backup paths
# Only back up OpenClaw state directory - contains config, sessions,
# credentials, extensions, media, workspace, and memory
paths:
  - path: /data/.openclaw
    exclude:
      - "*.lock"
      - "*.pid"
      - "*.sock"

  - path: /data/tailscale

# Global settings
backup_interval_seconds: 30 # 30 seconds
prune_interval_seconds: 3600 # 1 hour

# Retention policy (for restic forget)
retention:
  keep_last: 10
  keep_hourly: 48
  keep_daily: 30
  keep_weekly: 8
  keep_monthly: 6
